# ========================
# SERVER CONFIG
# ========================
server.port=${PORT:8080}
server.servlet.context-path=/nextroute

# ========================
# MySQL DATABASE
# ========================
# Railway injects MYSQL_URL, MYSQL_USERNAME, MYSQL_PASSWORD
# Local defaults are kept for dev
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/nextroute_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:2008}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================
# JPA / HIBERNATE
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ========================
# JWT CONFIG
# ========================
jwt.secret=${JWT_SECRET:NextRoute_Super_Secret_Key_Change_This_In_Production_2026}
jwt.expiration=86400000

# ========================
# ADMIN CREDENTIALS
# ========================
admin.email=${ADMIN_EMAIL:admin@nextroute.com}
admin.password=${ADMIN_PASSWORD:admin123}
admin.name=Admin

# ========================
# CORS
# ========================
# Comma-separated origins — add your Vercel URL here after deploying
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# ========================
# FILE UPLOAD LIMITS
# ========================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=200MB
