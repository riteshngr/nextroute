# --- Server ---
server.port=${PORT:8080}
server.servlet.context-path=/nextroute

# --- MySQL ---
# Railway gives us individual vars (MYSQLHOST, etc.), so we build the JDBC URL ourselves
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:nextroute_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:2008}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- JWT ---
jwt.secret=${JWT_SECRET:NextRoute_Super_Secret_Key_Change_This_In_Production_2026}
jwt.expiration=86400000

# --- Admin ---
admin.email=${ADMIN_EMAIL:admin@nextroute.com}
admin.password=${ADMIN_PASSWORD:admin123}
admin.name=Admin

# --- CORS ---
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# --- File uploads ---
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=200MB
